services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lulu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lulu}
      POSTGRES_DB: ${POSTGRES_DB:-lulu}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-lulu} -d ${POSTGRES_DB:-lulu}']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '5432:5432'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - apps/api/.env
    environment:
      # Always talk to the `db` service by its compose network hostname, regardless of
      # what apps/api/.env sets DATABASE_URL to for local (non-Docker) development.
      DATABASE_URL: postgresql://${POSTGRES_USER:-lulu}:${POSTGRES_PASSWORD:-lulu}@db:5432/${POSTGRES_DB:-lulu}?schema=public
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3001:3001'

volumes:
  pgdata:
